{% extends 'core/layout.html' %}

{% load static %}
{% block head %}<link rel="icon" type="image/x-icon" href="{% static 'images/regex.webp' %}">{% endblock %}

{% block title %}Regex Generator{% endblock %}

{% block body %}
    <form action="{% url 'generate' %}" method="post" class="mt-7 max-w-xl mx-auto bg-white p-6 rounded-2xl shadow-md space-y-4">
        {% csrf_token %}
        <input type="hidden" id="csrf_token" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
        <label for="prompt" class="block text-lg font-semibold text-gray-800">Describe your regex:</label>
        <input
            type="text"
            name="prompt"
            id="prompt"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
            placeholder="e.g. Validate email address"
            required
        >
        <button
            type="submit"
            class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition"
        >
            Generate Regex
        </button>
        </form>
        <div style="display: none;" id="result" class="mt-6 max-w-xl mx-auto bg-gray-100 p-4 rounded-xl shadow-sm text-gray-800 font-mono text-sm break-words">
            <span class="text-indigo-600 font-bold">Result:    </span>
            <span id="output"></span>
            <button
                id="copyBtn"
                class="ml-2 px-3 py-1 bg-gray-200 hover:bg-gray-300 rounded text-sm font-medium text-gray-700"
            >
                Copy
            </button>
        </div>
    </div>
{% endblock %}
