<!DOCTYPE html>
<html lang="en">
    <head>
        {% load static %}
        {% block head %}{% endblock %}
        <link href="{% static 'css/output.css' %}" rel="stylesheet">
        <title>{% block title %}{% endblock %}</title>
        <meta name="google-site-verification" content="bZpl3O4daQ3ZnyaqYk94lAfaYP4eVRs9IKytppQ6Kzw" />
    </head>
    <body>
        <nav class="w-full bg-white shadow-md">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="text-xl font-semibold text-indigo-600">
                       <a href="{% url 'index' %}">⚡ Regex Generator</a>
                    </div>
                    <div>
                        <a href="{% url 'support' %}"
                        class="inline-flex items-center bg-yellow-400 hover:bg-yellow-500 text-black font-bold py-2 px-4 rounded transition duration-300">
                            ☕ Buy Me a Coffee
                        </a>
                    </div>
                </div>
            </div>
        </nav>
        {% block body %}{% endblock %}
        <script src="{% static 'script/script.js' %}"></script>
    </body>
</html>
