<!DOCTYPE html>
<html lang="en">
    <head>
        {% load static %}
        {% block head %}{% endblock %}
        <link href="{% static 'css/output.css' %}" rel="stylesheet">
        <title>{% block title %}{% endblock %}</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AI Regex Generator - Free, Fast, No Login Needed</title>
        <meta name="description" content="Generate regular expressions instantly using AI. No sign-up, beginner-friendly, and 100% free. Just describe your pattern and get your regex.">
        <meta name="keywords" content="regex generator, AI regex, regular expression, pattern matching, python regex, free regex tool, regex online generator">
        <meta name="author" content="Aaditya Mukherjee">
        <meta name="robots" content="index, follow">
        
        <!-- Open Graph (for social media sharing) -->
        <meta property="og:title" content="AI Regex Generator">
        <meta property="og:description" content="Generate regex with AI. No login. Free and simple.">
        <meta property="og:url" content="https://regexai.onrender.com/">
        <meta property="og:image" content="{% static 'images/regex.webp' %}">
        <meta property="og:type" content="website">

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="AI Regex Generator – Fast & Free">
        <meta name="twitter:description" content="Type your pattern. Get your regex. No login required.">
        <meta name="twitter:image" content="{% static 'images/regex.webp' %}">

        <link rel="icon" type="image/x-icon" href="{% static 'images/regex.webp' %}">
        <script src="{% static 'script/script.js' %}"></script><meta name="robots" content="index, follow">
        <meta name="google-site-verification" content="bZpl3O4daQ3ZnyaqYk94lAfaYP4eVRs9IKytppQ6Kzw" />
    </head>
    <body class="overflow-hidden">
        <nav class="w-full bg-white shadow-md">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="text-xl font-semibold text-indigo-600">
                       <a href="{% url 'index' %}">⚡ Regex Generator</a>
                    </div>
                    <div>
                        <a href="{% url 'support' %}"
                        class="inline-flex items-center bg-yellow-400 hover:bg-yellow-500 text-black font-bold py-2 px-4 rounded transition duration-300">
                            ☕ Buy Me a Coffee
                        </a>
                    </div>
                </div>
            </div>
        </nav>
        {% block body %}{% endblock %}
        <script src="{% static 'script/script.js' %}"></script>
    </body>
</html>
